<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShyPixels</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>ShyPixels</h1>
    <p class="domain" id="domain"></p>

    <div class="toggle-section">
      <label class="toggle-row">
        <span>Enabled on this site</span>
        <input type="checkbox" id="siteToggle" checked>
        <span class="toggle-slider"></span>
      </label>
      <label class="toggle-row">
        <span>Enabled globally</span>
        <input type="checkbox" id="globalToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="intensity-section">
      <label class="intensity-label">
        <span>Blur intensity</span>
        <span id="intensityValue">20px</span>
      </label>
      <input type="range" id="intensitySlider" min="1" max="50" value="20" class="slider">
    </div>

    <button id="selectBtn" class="btn btn-primary">Select Element</button>

    <div class="rules-section">
      <div class="rules-header">
        <h2>Active Rules</h2>
        <button id="clearAllBtn" class="btn btn-danger btn-small">Clear All</button>
      </div>
      <ul id="rulesList" class="rules-list"></ul>
      <p id="noRules" class="no-rules">No blur rules for this domain.</p>
    </div>

    <div class="io-section">
      <button id="exportBtn" class="btn btn-secondary btn-small">Export Rules</button>
      <button id="importBtn" class="btn btn-secondary btn-small">Import Rules</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
